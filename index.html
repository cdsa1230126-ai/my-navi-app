<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>最強ハイブリッド・ナビ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="api-config-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>初期設定</h3>
      <p>APIキーをブラウザに保存します。</p>
      <input type="text" id="mapbox-token-input" placeholder="Mapbox Token" />
      <input type="text" id="yahoo-id-input" placeholder="Yahoo! App ID" />
      <button id="save-api-keys">設定を保存して開始</button>
    </div>
  </div>

  <div id="search-container">
    <input type="text" id="search-box" placeholder="目的地を検索（例：東京タワー）" autocomplete="off" />
    <div id="search-loader" class="hidden">
      <span class="spinner"></span> 探索中...
    </div>
    <div id="suggestions-container" class="hidden">
      <ul id="suggestions"></ul>
    </div>
  </div>

  <div id="map"></div>

  <div id="route-info-container" class="hidden">
    <div class="panel-content">
      <strong id="destination-name"></strong>
      
      <div class="calc-section">
        <div class="input-row">
          <label>到着希望</label>
          <input type="time" id="target-arrival-time">
        </div>
        <div class="input-row">
          <label>休憩(分)</label>
          <input type="number" id="rest-time" value="0" min="0" step="5">
        </div>
        <div id="departure-result" class="hidden">
          推奨出発: <span id="calc-time">--:--</span>
        </div>
      </div>

      <div class="stats-row">
        <span>距離: <span id="route-distance"></span></span>
        <span>所要: <span id="route-duration"></span></span>
      </div>
      
      <div class="button-row">
        <button id="close-btn">閉じる</button>
        <button id="reset-btn" onclick="localStorage.clear(); location.reload();">設定リセット</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
