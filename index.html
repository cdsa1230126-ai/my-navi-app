<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>多言語ナビ・ハイブリッド</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="api-config-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>設定</h3>
      <input type="text" id="api-key-input" placeholder="Mapbox Tokenを入力" />
      <button id="save-api-key">開始</button>
    </div>
  </div>

  <div id="search-container">
    <input type="text" id="search-box" placeholder="場所・施設を検索" /> 
  </div>

  <div id="map-container">
    <div id="map"></div>
    <div id="route-info-container" class="hidden">
      <ul id="route-info-list">
        <li id="destination-name"></li>
        <li id="route-distance"></li>
        <li id="route-duration"></li>
      </ul>
    </div>
  </div>

  <div id="suggestions-container" class="hidden">
    <ul id="suggestions"></ul>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
