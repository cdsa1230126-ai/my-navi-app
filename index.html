<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>最強ハイブリッド・ナビ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="api-config-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>初期設定</h3>
      <p>APIキーをブラウザに保存します。<br>GitHubに公開されないので安全です。</p>
      <input type="text" id="mapbox-token-input" placeholder="Mapbox Access Token (pk.ey...)" />
      <input type="text" id="yahoo-id-input" placeholder="Yahoo! Application ID (dmVy...)" />
      <button id="save-api-keys">設定を保存して開始</button>
      <p class="modal-note">※キーを間違えた場合はブラウザの履歴を消去してください</p>
    </div>
  </div>

  <div id="search-container">
    <input type="text" id="search-box" placeholder="目的地を検索（例：東京タワー）" autocomplete="off" />
    <div id="search-loader" class="hidden">
      <span class="spinner"></span> 候補地を探索中...
    </div>
    <div id="suggestions-container" class="hidden">
      <ul id="suggestions"></ul>
    </div>
  </div>

  <div id="map"></div>

  <div id="route-info-container" class="hidden">
    <div id="route-info">
      <strong id="destination-name"></strong><br>
      <span id="route-distance"></span> / <span id="route-duration"></span>
    </div>
    <button id="reset-btn" onclick="localStorage.clear(); location.reload();">キーを解除</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
