<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>究極ナビマップ - 標準キーボード版</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="api-config-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>Mapbox API設定</h3>
      <p>個人のアクセストークンを入力してください。</p>
      <input type="text" id="api-key-input" placeholder="pk.ey..." />
      <button id="save-api-key">設定を保存して開始</button>
      <p class="small-text">
        <a href="https://account.mapbox.com/" target="_blank">トークン取得はこちら</a>
      </p>
    </div>
  </div>

  <div id="instruction-banner" class="hidden">
    <div id="next-step-text">案内を開始します</div>
  </div>

  <div id="search-container">
    <input type="text" id="search-box" placeholder="目的地を検索" /> 
  </div>

  <div id="map-container">
    <div id="map"></div>
    <button id="follow-button" class="map-overlay-btn active">◎ 現在地</button>
    <button id="settings-button" class="map-overlay-btn settings-btn">⚙ 設定</button>
    
    <div id="route-info-container" class="hidden">
      <ul id="route-info-list">
        <li id="destination-name"></li>
        <li id="route-distance"></li>
        <li id="route-duration"></li>
      </ul>
      <button id="start-route-button" class="hidden">案内開始</button>
    </div>
  </div>

  <div id="suggestions-container" class="hidden">
    <ul id="suggestions"></ul>
  </div>

  <div id="guidance-message" class="guidance-hidden"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
