<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Smart Navi Pro</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div id="api-config-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>API設定</h3>
            <input type="text" id="mapbox-token-input" placeholder="Mapbox Access Token">
            <input type="text" id="yahoo-id-input" placeholder="Yahoo! Client ID">
            <button id="save-api-keys" class="btn-primary" style="width: 100%;">保存して開始</button>
        </div>
    </div>

    <div id="search-container">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="search-box" placeholder="目的地を検索" autocomplete="off">
        </div>
        <div id="route-options-container" class="route-options hidden">
            <span class="option-label">優先道路:</span>
            <label class="switch">
                <input type="checkbox" id="use-highways" checked>
                <span class="slider"></span>
            </label>
            <span id="route-type-label">高速道路優先</span>
        </div>
        <div id="suggestions-container" class="hidden">
            <ul id="suggestions"></ul>
        </div>
    </div>

    <div id="nav-banner" class="hidden">
        <div class="banner-item">
            <span class="banner-label">到着予定</span>
            <span id="banner-arrival" class="banner-value">--:--</span>
        </div>
        <div class="banner-divider"></div>
        <div class="banner-item">
            <span class="banner-label">次の休憩まで</span>
            <span id="banner-next-rest" class="banner-value orange">--分</span>
        </div>
    </div>

    <div id="info-panel" class="hidden">
        <div class="panel-handle"></div>
        <div class="panel-content">
            <div id="pre-nav-content">
                <div class="panel-header">
                    <div>
                        <h2 id="destination-name">目的地</h2>
                        <span id="route-distance" class="sub-text">--km</span>
                    </div>
                    <div id="route-duration" class="stat-highlight">--分</div>
                </div>

                <div class="config-grid">
                    <div class="config-item">
                        <label>到着希望時刻</label>
                        <input type="time" id="target-arrival-time">
                    </div>
                    <div class="config-item">
                        <label>休憩回数</label>
                        <select id="rest-count">
                            <option value="0">なし</option>
                            <option value="1" selected>1回</option>
                            <option value="2">2回</option>
                            <option value="3">3回</option>
                        </select>
                    </div>
                    <div class="config-item">
                        <label>1回の休憩</label>
                        <select id="rest-time">
                            <option value="15" selected>15分</option>
                            <option value="30">30分</option>
                            <option value="60">60分</option>
                        </select>
                    </div>
                </div>

                <div id="departure-card" class="hidden">
                    <div class="calc-label">推奨出発時刻</div>
                    <div id="calc-time">--:--</div>
                </div>

                <div class="panel-footer">
                    <button id="close-panel" class="btn-secondary">閉じる</button>
                    <button id="start-nav" class="btn-primary">案内開始</button>
                </div>
            </div>

            <div id="nav-active-content" class="hidden">
                <div class="nav-active-layout">
                    <span id="nav-remaining-time">--分</span>
                    <button id="stop-nav" class="btn-stop">案内終了</button>
                </div>
            </div>
        </div>
    </div>

    <div class="side-controls">
        <button id="view-toggle-btn" class="map-ctrl-btn">3D</button>
        <button id="recenter-btn" class="map-ctrl-btn">📍</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
