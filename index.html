<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart Navi Pro</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.14.1/mapbox-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="map"></div>

    <div id="api-config-modal" class="modal hidden">
        <div class="modal-content">
            <h3>APIキーの設定</h3>
            <input type="text" id="mapbox-token-input" placeholder="Mapbox Access Token">
            <input type="text" id="yahoo-id-input" placeholder="Yahoo! Client ID">
            <button id="save-api-keys">アプリを開始</button>
        </div>
    </div>

    <div id="search-container">
        <div class="search-bar">
            <input type="text" id="search-box" placeholder="目的地を検索">
        </div>
        <div class="route-options">
            <span class="option-label">優先道路:</span>
            <label class="switch">
                <input type="checkbox" id="use-highways" checked>
                <span class="slider"></span>
            </label>
            <span id="route-type-label">高速道路優先</span>
        </div>
        <div id="suggestions-container" class="hidden">
            <ul id="suggestions"></ul>
        </div>
    </div>

    <div id="nav-banner" class="hidden">
        <div class="banner-item">
            <span class="label">到着予定</span>
            <span id="banner-arrival" class="value">--:--</span>
        </div>
        <div class="banner-divider"></div>
        <div class="banner-item">
            <span class="label">次の休憩まで</span>
            <span id="banner-next-rest" class="value highlight">--分</span>
        </div>
    </div>

    <div id="info-panel" class="hidden">
        <div class="panel-header">
            <div id="drag-handle"></div>
            <button id="close-panel">×</button>
        </div>
        <div class="panel-content">
            <div id="pre-nav-content">
                <h2 id="destination-name">目的地</h2>
                <div class="route-stats">
                    <span>距離: <b id="route-distance">--</b></span>
                    <span>所要時間: <b id="route-duration">--</b></span>
                </div>
                <div class="config-grid">
                    <div class="config-item">
                        <label>到着希望時刻</label>
                        <input type="time" id="target-arrival-time">
                    </div>
                    <div class="config-item">
                        <label>休憩回数</label>
                        <input type="number" id="rest-count" value="1" min="0" max="5">
                    </div>
                    <div class="config-item">
                        <label>1回の休憩</label>
                        <select id="rest-time">
                            <option value="15">15分</option>
                            <option value="30">30分</option>
                        </select>
                    </div>
                </div>
                <div id="departure-card" class="hidden">
                    <div class="calc-label">推奨出発時刻</div>
                    <div id="calc-time">--:--</div>
                    <div id="total-rest-info"></div>
                </div>
                <button id="start-nav" class="primary-btn">案内開始</button>
            </div>
            <div id="nav-active-content" class="hidden">
                <div class="nav-status">
                    <span id="nav-remaining-time" class="big-text">--分</span>
                    <button id="stop-nav" class="danger-btn">案内終了</button>
                </div>
            </div>
        </div>
    </div>

    <div class="side-controls">
        <button id="view-toggle-btn">3D</button>
        <button id="recenter-btn">📍</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
