<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>最強ハイブリッド・ナビ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
  <script src='https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js'></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="info-panel" class="hidden">
    <h2 id="destination-name">目的地</h2>
    <div style="background: #f0f7ff; padding: 10px; border-radius: 8px; margin-bottom: 10px;">
        <label style="font-size: 0.9em; color: #555;">到着希望時刻</label><br>
        <input type="time" id="target-arrival-time" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
        
        <label style="font-size: 0.9em; color: #555; margin-top: 10px; display: block;">休憩時間（分）</label>
        <input type="number" id="rest-time" value="0" min="0" step="5" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;">
    </div>
    
    <div id="departure-result" style="text-align: center; margin: 15px 0; padding: 10px; background: #fff0f0; border-radius: 8px; border: 2px solid #ff4500; display: none;">
        <div style="font-size: 0.8em; color: #ff4500;">推奨出発時間</div>
        <div id="calc-time" style="font-size: 1.5em; font-weight: bold; color: #d00;">--:--</div>
    </div>

    <p>距離: <span id="route-distance">--</span></p>
    <p>所要時間: <span id="route-duration">--</span></p>
    
    <div style="display: flex; gap: 10px;">
        <button id="close-panel" style="flex: 1;">閉じる</button>
        <button id="reset-btn" style="flex: 1; background: #666;" onclick="localStorage.clear(); location.reload();">設定リセット</button>
    </div>
  </div>

  <div id="api-config-modal" class="modal-overlay hidden">
    <div class="modal-content">
      <h3>初期設定</h3>
      <p>APIキーをブラウザに保存します。</p>
      <input type="text" id="mapbox-token-input" placeholder="Mapbox Token (pk.ey...)" />
      <input type="text" id="yahoo-id-input" placeholder="Yahoo! App ID (dmVy...)" />
      <button id="save-api-keys">設定を保存して開始</button>
    </div>
  </div>

  <div id="search-container">
    <input type="text" id="search-box" placeholder="目的地を検索" autocomplete="off" />
    
    <div id="location-status" style="margin-top: 5px; padding: 5px 10px; background: rgba(255,255,255,0.9); border-radius: 5px; font-size: 12px; color: #666; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        📍 現在地を取得中...
    </div>

    <div id="search-loader" class="hidden">
        <span class="spinner"></span> 探索中...
    </div>
    <div id="suggestions-container" class="hidden">
      <ul id="suggestions"></ul>
    </div>
  </div>

  <div id="map"></div>

  <script src="script.js"></script>
</body>
</html>
